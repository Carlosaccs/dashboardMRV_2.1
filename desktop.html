<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV SP</title>
    <style>
        :root {
            --primary-green: #007236;
            --secondary-yellow: #febd11;
            --dark-green: #004d24;
            --light-bg: #f4f4f4;
            --text-dark: #333333;
            --white: #ffffff;
            --orange-action: #f06b24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-bg);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- HEADER --- */
        header {
            background-color: var(--primary-green);
            color: var(--white);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1000; /* Garante que o cabeçalho fique por cima de tudo */
            position: relative;
        }

        header h1 {
            font-size: 1.4rem;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            position: relative; /* Contexto de posicionamento para o menu flutuante */
        }

        .btn-nav {
            background-color: var(--secondary-yellow);
            color: var(--dark-green);
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-nav:hover {
            background-color: #e0a60f;
        }

        /* --- MENU FLUTUANTE DE DOCUMENTOS --- */
        /* Protegido com z-index alto e largura controlada para nunca quebrar ou sumir */
        .dropdown-menu {
            position: absolute;
            top: 110%; /* Abre logo abaixo do botão */
            right: 0;
            background-color: var(--dark-green);
            color: var(--white);
            border-radius: 8px;
            padding: 15px;
            width: 280px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            display: none; /* Escondido por padrão */
            z-index: 9999; /* Máxima prioridade visual */
        }

        /* Classe que ativa a exibição do menu */
        .dropdown-menu.active {
            display: block;
        }

        .dropdown-menu ul {
            list-style: none;
        }

        .dropdown-menu li {
            font-size: 0.85rem;
            font-weight: bold;
            font-style: italic;
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 4px;
        }

        .dropdown-menu li:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--secondary-yellow);
        }

        .dropdown-menu li:last-child {
            border-bottom: none;
        }

        /* --- CONTAINER PRINCIPAL DO DASHBOARD ORIGINAL --- */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* COLUNA ESQUERDA (RESIDENCIAIS) */
        .sidebar-left {
            width: 25%;
            background-color: var(--white);
            border-right: 1px solid #ddd;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .project-item {
            padding: 12px;
            background-color: var(--white);
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.2s;
            text-align: left;
        }

        .project-item:hover {
            background-color: #f9f9f9;
            border-color: var(--primary-green);
        }

        /* Regra de destaque: borda verde e fundo cinza claro ao clicar */
        .project-item.selected {
            border: 2px solid var(--primary-green) !important;
            background-color: #f0f0f0 !important;
        }

        /* CENTRO (ÁREA DO MAPA) */
        .map-content {
            width: 75%; /* Ocupa o restante da tela de forma limpa */
            background-color: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .map-header {
            width: 100%;
            background-color: #eaeaea;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            color: #555;
            border-bottom: 1px solid #ddd;
        }

        .map-wrapper {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .placeholder-text {
            color: #999;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Residenciais MRV em São Paulo</h1>
        <div class="nav-buttons">
            <button class="btn-nav" id="btn-documentos">Documentos</button>
            <button class="btn-nav" id="btn-sobre">Sobre</button>
            
            <div class="dropdown-menu" id="menu-documentos">
                <ul>
                    <li onclick="abrirDocumento('https://www.google.com')">Carteira de Trabalho Digital</li>
                    <li onclick="abrirDocumento('https://www.google.com')">Extrato do FGTS</li>
                    <li onclick="abrirDocumento('https://www.google.com')">Certidão Estado Civil</li>
                    <li onclick="abrirDocumento('https://www.google.com')">Certidão Dependente</li>
                </ul>
            </div>
        </div>
    </header>

    <div class="main-container">
        
        <div class="sidebar-left" id="sidebar-residenciais">
            <button class="project-item" onclick="selecionarProjeto(this, 'Residencial Nascente Do Jequitibá')">Residencial Nascente Do Jequitibá</button>
            <button class="project-item" onclick="selecionarProjeto(this, 'Residencial Parque das Flores')">Residencial Parque das Flores</button>
            <button class="project-item" onclick="selecionarProjeto(this, 'Residencial Vila Verde')">Residencial Vila Verde</button>
        </div>

        <div class="map-content">
            <div class="map-header" id="map-header-title">Selecione um residencial</div>
            <div class="map-wrapper" id="map-container">
                <div class="placeholder-text">[Área reservada para o seu Mapa SVG original]</div>
            </div>
        }
        </div>

    </div>

    <script>
        const btnDocumentos = document.getElementById('btn-documentos');
        const menuDocumentos = document.getElementById('menu-documentos');

        // Abre e fecha o menu ao clicar no botão "Documentos"
        btnDocumentos.addEventListener('click', (e) => {
            e.stopPropagation(); // Evita que o clique feche o menu imediatamente
            menuDocumentos.classList.toggle('active');
        });

        // Se o usuário clicar em qualquer outro lugar da tela, fecha o menu com segurança
        document.addEventListener('click', (e) => {
            if (!menuDocumentos.contains(e.target) && e.target !== btnDocumentos) {
                menuDocumentos.classList.remove('active');
            }
        });

        // Função para os cliques nos botões da esquerda (Mantendo seu padrão visual)
        function selecionarProjeto(elemento, nomeProjeto) {
            // Remove o destaque dos outros botões
            document.querySelectorAll('.project-item').forEach(btn => btn.classList.remove('selected'));
            // Aplica a borda verde e fundo cinza claro no selecionado
            elemento.classList.add('selected');
            
            // Atualiza o cabeçalho interno
            document.getElementById('map-header-title').innerText = nomeProjeto;
        }

        // Função de clique para os itens do menu de documentos
        function abrirDocumento(url) {
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
