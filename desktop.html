<!DOCTYPE html>
<html lang="pt-br" class="notranslate">
<head>
    <link rel="stylesheet" href="desktop.css">

    <style>
        /* Blindagem Total do Header */
        .header {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            padding: 0 40px !important; 
            height: 60px !important;
            background-color: #006d38 !important;
            position: relative !important;
            width: 100% !important;
            box-sizing: border-box !important;
        }

        .header-titulo {
            color: white !important;
            font-weight: bold !important;
            font-size: 1.1rem !important;
            margin: 0 !important;
            position: static !important;
        }

        /* Container que agrupa os novos botões lado a lado */
        .header-buttons-container {
            display: flex !important;
            gap: 10px !important;
            position: static !important;
            margin-right: 0 !important;
        }

        /* Estilo dos Botões (Amarelo, Retangular, Sem conflito) */
        .btn-mrv-style {
            background-color: #fbc02d !important;
            color: #333 !important;
            border: none !important;
            padding: 8px 18px !important;
            border-radius: 4px !important;
            font-size: 0.8rem !important;
            font-weight: bold !important;
            text-transform: uppercase !important;
            cursor: pointer !important;
            white-space: nowrap !important;
            /* Anula qualquer herança do CSS antigo */
            position: static !important;
            top: auto !important;
            right: auto !important;
            margin: 0 !important;
            float: none !important;
        }

        .btn-mrv-style:hover {
            background-color: #fdd835 !important;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-titulo">RESIDENCIAIS MRV EM SÃO PAULO - mai/26</div>
        
        <div class="header-buttons-container">
            <button id="btn-doc-novo" class="btn-mrv-style">Documentos</button>
            <button id="btn-sobre-novo" class="btn-mrv-style">Sobre</button>
        </div>
    </div>

    <script>
        // Ajuste no JavaScript para reconhecer os novos IDs dos botões
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById("modal-sobre");
            const btnSobre = document.getElementById("btn-sobre-novo");
            const btnDoc = document.getElementById("btn-doc-novo");
            const span = document.querySelector(".modal-close");

            if(btnSobre) {
                btnSobre.onclick = () => { modal.style.display = "block"; };
            }
            
            // Aqui depois colocaremos a função do botão Documentos
            if(btnDoc) {
                btnDoc.onclick = () => { alert("Botão Documentos clicado!"); };
            }

            if(span) span.onclick = () => { modal.style.display = "none"; };
        });
    </script>
</body>
</html>
