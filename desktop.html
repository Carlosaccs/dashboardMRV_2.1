<!DOCTYPE html>
<html lang="pt-br" class="notranslate">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="desktop.css">

    <style>
        /* RESET DE SEGURANÇA PARA O HEADER */
        .header {
            display: flex !important;
            align-items: center !important;
            justify-content: flex-start !important; /* Alinha tudo à esquerda por padrão */
            padding: 0 !important;
            height: 65px !important;
            background-color: #006d38 !important;
            position: relative !important;
        }

        /* CAIXA DO TÍTULO: Controla a distância da borda esquerda */
        .header-titulo {
            margin-left: 50px !important; /* Ajuste este número para mover o título mais para a direita ou esquerda */
            color: white !important;
            font-weight: bold !important;
            font-size: 1.1rem !important;
            flex-grow: 1 !important; /* Empurra o que vier depois para o fim da linha */
        }

        /* CAIXA DOS BOTÕES: Força o alinhamento e impede sobreposição */
        .header-buttons-container {
            display: flex !important;
            gap: 15px !important;
            margin-right: 40px !important; /* Distância da quina direita da tela */
            align-items: center !important;
        }

        /* ESTILO DOS BOTÕES (Amarelo Retangular) */
        .btn-header-novo {
            position: static !important; /* ANULA o absolute/fixed do seu CSS antigo */
            float: none !important;
            background-color: #fbc02d !important;
            color: #333 !important;
            border: none !important;
            padding: 8px 20px !important;
            border-radius: 4px !important;
            font-size: 0.8rem !important;
            font-weight: bold !important;
            text-transform: uppercase !important;
            cursor: pointer !important;
            white-space: nowrap !important;
        }

        .btn-header-novo:hover {
            background-color: #fdd835 !important;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="header-titulo">
            RESIDENCIAIS MRV EM SÃO PAULO - mai/26
        </div>
        
        <div class="header-buttons-container">
            <button id="btn-documentos" class="btn-header-novo">Documentos</button>
            <button id="btn-sobre" class="btn-header-novo">Sobre</button>
        </div>
    </div>

    <div class="wrapper">
        <aside class="sidebar-esq" id="lista-imoveis">
            <div style="padding:20px; color:#666; font-size: 0.8rem;">Carregando residenciais...</div>
        </aside>
        
        <main class="conteudo-centro">
            <div id="cidade-titulo">Selecione uma região no mapa</div> 
            <div id="caixa-a"></div> 
            <div id="caixa-b"></div> 
        </main>

        <aside class="sidebar-dir" id="ficha-tecnica">
            <div style="text-align:center; color:#ccc; margin-top:100px;">
                <p style="font-size: 30px;">📍</p>
                <p>Clique em algum Residencial ou em alguma região verde do mapa</p>
            </div>
        </aside>
    </div>

    <script src="mapa-SP.js"></script>
    <script src="desktop.js"></script>
</body>
</html>
